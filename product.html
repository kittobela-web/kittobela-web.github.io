<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Product — Kittos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --cream:#f7f3ee; --offwhite:#faf8f5; --beige:#e8ddd0;
      --tan:#d4c4b0; --brown:#8b6f56; --darkbrown:#5c4333;
      --accent:#c4855a; --text:#3d2e22; --muted:#9e8878;
      --shadow:rgba(92,67,51,0.12);
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth}
    body{font-family:'DM Sans',sans-serif;background:var(--offwhite);color:var(--text)}

    nav{background:var(--cream);border-bottom:1.5px solid var(--beige);position:sticky;top:0;z-index:100;padding:0 5vw;display:flex;align-items:center;justify-content:space-between;height:72px}
    .nav-logo{font-family:'Playfair Display',serif;font-size:1.75rem;font-weight:700;color:var(--darkbrown);text-decoration:none;letter-spacing:-0.5px}
    .nav-logo span{color:var(--accent)}
    .back-link{display:inline-flex;align-items:center;gap:6px;color:var(--brown);text-decoration:none;font-size:0.9rem;font-weight:500;transition:color .2s}
    .back-link:hover{color:var(--accent)}

    .breadcrumb{padding:20px 8vw 0;font-size:0.82rem;color:var(--muted)}
    .breadcrumb a{color:var(--accent);text-decoration:none}
    .breadcrumb a:hover{text-decoration:underline}

    /* ── PRODUCT LAYOUT ── */
    .product-page{display:grid;grid-template-columns:1fr 1fr;gap:56px;padding:36px 8vw 80px;max-width:1200px;margin:0 auto}

    /* ── LEFT: GALLERY ── */
    .gallery-col{}

    /* main image */
    .main-img-wrap{position:relative;border-radius:20px;overflow:hidden;background:var(--beige);aspect-ratio:1/1;margin-bottom:14px}
    .main-img-wrap img{width:100%;height:100%;object-fit:cover;display:none;transition:opacity .3s}
    .main-img-wrap img.active{display:block}
    .main-badge{position:absolute;top:16px;left:16px;z-index:2;background:var(--accent);color:white;font-size:0.72rem;letter-spacing:1px;text-transform:uppercase;padding:5px 12px;border-radius:20px;font-weight:600}
    /* arrow buttons */
    .gallery-arrow{position:absolute;top:50%;transform:translateY(-50%);z-index:3;background:rgba(255,255,255,0.85);border:none;border-radius:50%;width:40px;height:40px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:1rem;color:var(--darkbrown);box-shadow:0 2px 10px var(--shadow);transition:background .2s,transform .2s}
    .gallery-arrow:hover{background:white;transform:translateY(-50%) scale(1.05)}
    .gallery-arrow.prev{left:12px}
    .gallery-arrow.next{right:12px}
    /* image counter */
    .img-counter{position:absolute;bottom:14px;right:16px;z-index:2;background:rgba(60,40,22,0.55);color:rgba(255,255,255,0.9);font-size:0.75rem;padding:4px 10px;border-radius:20px;font-weight:500}

    /* thumbnail strip */
    .thumb-strip{display:flex;gap:10px;flex-wrap:nowrap;overflow-x:auto;padding-bottom:4px;scrollbar-width:thin;scrollbar-color:var(--tan) transparent}
    .thumb-strip::-webkit-scrollbar{height:4px}
    .thumb-strip::-webkit-scrollbar-track{background:transparent}
    .thumb-strip::-webkit-scrollbar-thumb{background:var(--tan);border-radius:2px}
    .thumb{width:72px;height:72px;flex-shrink:0;border-radius:10px;overflow:hidden;cursor:pointer;border:2.5px solid transparent;transition:border-color .2s,transform .2s}
    .thumb:hover{transform:scale(1.04)}
    .thumb.active{border-color:var(--accent)}
    .thumb img{width:100%;height:100%;object-fit:cover}

    /* ── RIGHT: INFO ── */
    .info-col{padding-top:6px}
    .p-eyebrow{font-size:0.72rem;letter-spacing:3px;text-transform:uppercase;color:var(--accent);font-weight:500;margin-bottom:8px}
    .p-title{font-family:'Playfair Display',serif;font-size:2.1rem;color:var(--darkbrown);line-height:1.2;margin-bottom:14px}
    .p-price{font-size:1.55rem;font-weight:700;color:var(--accent);margin-bottom:18px}
    .p-desc{color:var(--muted);font-size:0.95rem;line-height:1.8;margin-bottom:26px}

    /* COLOUR SELECTOR */
    .colour-section{margin-bottom:28px}
    .colour-label{font-size:0.75rem;letter-spacing:2px;text-transform:uppercase;color:var(--brown);font-weight:500;margin-bottom:12px;display:flex;align-items:center;gap:8px}
    .colour-label span{color:var(--darkbrown);font-weight:600;font-size:0.85rem;letter-spacing:0}
    .colour-options{display:flex;gap:10px;flex-wrap:wrap}
    .colour-btn{display:flex;align-items:center;gap:8px;padding:8px 14px;border-radius:24px;border:1.5px solid var(--beige);background:var(--cream);cursor:pointer;font-family:'DM Sans',sans-serif;font-size:0.85rem;color:var(--text);transition:all .2s;font-weight:500}
    .colour-btn:hover{border-color:var(--accent)}
    .colour-btn.active{border-color:var(--darkbrown);background:white;box-shadow:0 2px 10px var(--shadow)}
    .colour-dot{width:18px;height:18px;border-radius:50%;flex-shrink:0;border:1.5px solid rgba(0,0,0,0.12)}

    /* features */
    .features-section{margin-bottom:28px}
    .features-section h4{font-size:0.75rem;letter-spacing:2px;text-transform:uppercase;color:var(--brown);margin-bottom:12px;font-weight:500}
    .feature-list{list-style:none;display:flex;flex-direction:column;gap:8px}
    .feature-list li{display:flex;align-items:center;gap:10px;font-size:0.9rem;color:var(--text)}
    .feature-list li::before{content:'✦';color:var(--accent);font-size:0.65rem;flex-shrink:0}

    .divider{height:1px;background:var(--beige);margin:24px 0}

    /* ORDER BOX */
    .order-box{background:var(--cream);border:2px dashed var(--tan);border-radius:18px;padding:26px;text-align:center}
    .order-box-label{font-size:0.72rem;letter-spacing:2px;text-transform:uppercase;color:var(--accent);font-weight:600;margin-bottom:6px}
    .order-box h3{font-family:'Playfair Display',serif;font-size:1.1rem;color:var(--darkbrown);margin-bottom:6px}
    .order-box p{font-size:0.82rem;color:var(--muted);margin-bottom:16px;line-height:1.6}
    .code-wrap{position:relative;display:inline-block}
    .code-display{background:var(--darkbrown);color:var(--cream);font-family:'Playfair Display',serif;font-size:1.5rem;letter-spacing:6px;padding:14px 28px;border-radius:12px;margin-bottom:10px;display:inline-block;cursor:pointer;transition:background .2s,transform .15s;user-select:all}
    .code-display:hover{background:var(--accent);transform:scale(1.02)}
    @keyframes codeFlash { 0%{background:var(--accent);transform:scale(1.06)} 100%{background:var(--darkbrown);transform:scale(1)} }
    .code-flash{animation:codeFlash .4s ease-out}
    .copied-toast{display:none;position:absolute;top:-34px;left:50%;transform:translateX(-50%);background:var(--accent);color:white;font-size:0.78rem;padding:5px 14px;border-radius:20px;white-space:nowrap}
    .copy-hint{font-size:0.75rem;color:var(--muted);margin-bottom:18px}
    .copy-hint span{color:var(--accent)}
    .fb-order-btn{display:inline-flex;align-items:center;justify-content:center;gap:10px;background:#1877F2;color:white;text-decoration:none;padding:14px 28px;border-radius:40px;font-weight:600;font-size:0.95rem;width:100%;transition:opacity .2s,transform .2s;box-shadow:0 4px 18px rgba(24,119,242,0.28)}
    .fb-order-btn:hover{opacity:.9;transform:translateY(-2px)}
    .fb-step{font-size:0.78rem;color:var(--muted);margin-top:12px;line-height:1.6}

    /* HOW IT WORKS */
    .how-section{background:var(--cream);padding:60px 8vw;text-align:center}
    .how-section h2{font-family:'Playfair Display',serif;font-size:1.8rem;color:var(--darkbrown);margin-bottom:40px}
    .steps-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:32px}
    .step{display:flex;flex-direction:column;align-items:center}
    .step-num{width:52px;height:52px;border-radius:50%;background:var(--darkbrown);color:var(--cream);display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-size:1.3rem;font-weight:700;margin-bottom:16px}
    .step h4{font-family:'Playfair Display',serif;font-size:1rem;color:var(--darkbrown);margin-bottom:8px}
    .step p{font-size:0.85rem;color:var(--muted);line-height:1.6;max-width:200px}

    /* MORE PRODUCTS */
    .more-section{padding:60px 8vw 80px}
    .more-section h2{font-family:'Playfair Display',serif;font-size:1.6rem;color:var(--darkbrown);margin-bottom:28px}
    .more-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:20px}
    .mini-card{background:var(--cream);border-radius:14px;overflow:hidden;border:1.5px solid var(--beige);text-decoration:none;color:inherit;display:block;transition:transform .2s,box-shadow .2s}
    .mini-card:hover{transform:translateY(-4px);box-shadow:0 12px 28px var(--shadow)}
    .mini-img{background:var(--beige);height:130px;overflow:hidden}
    .mini-img img{width:100%;height:100%;object-fit:cover;transition:transform .4s}
    .mini-card:hover .mini-img img{transform:scale(1.06)}
    .mini-info{padding:12px 14px}
    .mini-name{font-family:'Playfair Display',serif;font-size:0.95rem;color:var(--darkbrown);margin-bottom:4px}
    .mini-price{font-size:0.85rem;color:var(--accent);font-weight:600}

    footer{background:var(--darkbrown);color:var(--tan);padding:30px 8vw;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px}
    footer p{font-size:0.82rem;color:var(--muted)}
    .fb-link-sm{display:inline-flex;align-items:center;gap:8px;background:#1877F2;color:white;padding:8px 18px;border-radius:24px;text-decoration:none;font-size:0.85rem;font-weight:500;transition:opacity .2s}
    .fb-link-sm:hover{opacity:.85}

    @media(max-width:768px){
      .product-page{grid-template-columns:1fr;gap:30px;padding:20px 5vw 60px}
      .steps-grid{grid-template-columns:1fr}
      .more-section{padding:40px 5vw 60px}
    }
  </style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">Kittos<span>.</span></a>
  <a href="index.html" class="back-link">← Back to Shop</a>
</nav>

<div class="breadcrumb">
  <a href="index.html">Home</a> / <a href="index.html">Shop</a> / <span id="breadcrumbName">Product</span>
</div>

<div class="product-page">

  <!-- LEFT: GALLERY -->
  <div class="gallery-col">
    <div class="main-img-wrap" id="mainImgWrap">
      <!-- images injected by JS -->
      <button class="gallery-arrow prev" id="prevBtn">&#8592;</button>
      <button class="gallery-arrow next" id="nextBtn">&#8594;</button>
      <div class="img-counter" id="imgCounter">1 / 1</div>
    </div>
    <div class="thumb-strip" id="thumbStrip"></div>
  </div>

  <!-- RIGHT: INFO -->
  <div class="info-col" id="infoCol">
    <!-- injected by JS -->
  </div>

</div>

<!-- HOW IT WORKS -->
<!-- <section class="how-section">
  <h2>How to Order</h2>
  <div class="steps-grid">
    <div class="step"><div class="step-num">1</div><h4>Find your product</h4><p>Browse our collection and click on anything that catches your eye.</p></div>
    <div class="step"><div class="step-num">2</div><h4>Copy the code</h4><p>Each product has a unique order code. Tap it to copy automatically.</p></div>
    <div class="step"><div class="step-num">3</div><h4>Message us on Facebook</h4><p>Send the code via Messenger and we'll confirm your order!</p></div>
  </div>
</section> -->

<section class="more-section">
  <h2>You might also like</h2>
  <div class="more-grid" id="moreGrid"></div>
</section>

<footer>
  <p>© 2025 Kittos Cat Boutique.</p>
  <a class="fb-link-sm" href="https://www.facebook.com" target="_blank">
    <svg width="14" height="14" fill="white" viewBox="0 0 24 24"><path d="M24 12.07C24 5.41 18.63 0 12 0S0 5.4 0 12.07C0 18.1 4.39 23.1 10.13 24v-8.44H7.08v-3.49h3.04V9.41c0-3.02 1.8-4.7 4.54-4.7 1.31 0 2.68.24 2.68.24v2.97h-1.5c-1.5 0-1.96.93-1.96 1.89v2.26h3.32l-.53 3.5h-2.8V24C19.62 23.1 24 18.1 24 12.07z"/></svg>
    Order on Facebook
  </a>
</footer>

<script>
const products = [
  {
    id:1, name:"Fur removing glove ", cat:"accessories", badge:"Best Seller", price:"৳ 100",
    desc:"Gently remove loose fur while petting your cat. One size fits all, with a comfortable adjustable strap. Perfect for reducing shedding and keeping your home fur-free.",
    features:["Made with Durable Material","Easy to use"],
    colours:[
      { name:"Black", hex:"#333", images:["images/Fur-remover/image1.jpg","images/Fur-remover/image2.jpg","images/Fur-remover/image3.jpg","images/Fur-remover/image4.jpg","images/Fur-remover/image5.jpg","images/Fur-remover/image6.jpg"] },
    ]
  },
  {
    id:2, name:"Feather Wand Teaser", cat:"toys", badge:"Best Seller", price:"৳ 70",
    desc:"Interactive feather wand that triggers your cat's natural hunting instincts.",
    features:["Durable Construction","Pet Safe Materials",],
    colours:[
      { name:"Random-Colour", images:["images/Bath-Brush/image1.jpg","images/Bath-Brush/image2.jpg","images/Bath-Brush/image3.jpg"] },
      { name:"Pink", hex:"#c96080", images:["images/Bath-Brush/pink.jpg"] },
       { name:"Blue", hex:"#4070c9", images:["images/Bath-Brush/blue.jpg"] },
       { name:"Green", hex:"#40c940", images:["images/Bath-Brush/green.jpg"] },
    ]
  }
];

function generateCode(id, cidx = 0) {
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let code = 'KT-';
  const seed = (id * 7 + 13) + (cidx * 31);
  for (let i = 0; i < 6; i++) code += chars[(seed * (i + 3) + i * 17) % chars.length];
  return code;
}

const params = new URLSearchParams(window.location.search);
const id = parseInt(params.get('id')) || 1;
const product = products.find(p => p.id === id) || products[0];

function getCode() { return generateCode(product.id, activeColourIdx); }

document.getElementById('breadcrumbName').textContent = product.name;
document.title = `${product.name} — Kittos`;

// ── STATE ──
let activeColourIdx = 0;
let activeImgIdx = 0;

function getImages() {
  return product.colours[activeColourIdx].images;
}

// ── GALLERY FUNCTIONS ──
function buildMainGallery() {
  const wrap = document.getElementById('mainImgWrap');
  // remove old images
  wrap.querySelectorAll('img').forEach(el => el.remove());
  const imgs = getImages();
  imgs.forEach((src, i) => {
    const img = document.createElement('img');
    img.src = src;
    img.alt = product.name;
    img.loading = 'lazy';
    if (i === activeImgIdx) img.classList.add('active');
    wrap.appendChild(img);
  });
  updateCounter();
}

function buildThumbs() {
  const strip = document.getElementById('thumbStrip');
  strip.innerHTML = '';
  getImages().forEach((src, i) => {
    const div = document.createElement('div');
    div.className = 'thumb' + (i === activeImgIdx ? ' active' : '');
    div.innerHTML = `<img src="${src}" alt="" loading="lazy">`;
    div.addEventListener('click', () => goToImg(i));
    strip.appendChild(div);
  });
}

function goToImg(idx) {
  const imgs = getImages();
  if (idx < 0) idx = imgs.length - 1;
  if (idx >= imgs.length) idx = 0;
  activeImgIdx = idx;
  document.querySelectorAll('#mainImgWrap img').forEach((img, i) => img.classList.toggle('active', i === idx));
  document.querySelectorAll('.thumb').forEach((t, i) => t.classList.toggle('active', i === idx));
  updateCounter();
}

function updateCounter() {
  const imgs = getImages();
  document.getElementById('imgCounter').textContent = `${activeImgIdx + 1} / ${imgs.length}`;
  document.getElementById('prevBtn').style.display = imgs.length > 1 ? 'flex' : 'none';
  document.getElementById('nextBtn').style.display = imgs.length > 1 ? 'flex' : 'none';
}

document.getElementById('prevBtn').addEventListener('click', () => goToImg(activeImgIdx - 1));
document.getElementById('nextBtn').addEventListener('click', () => goToImg(activeImgIdx + 1));

// keyboard navigation
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft') goToImg(activeImgIdx - 1);
  if (e.key === 'ArrowRight') goToImg(activeImgIdx + 1);
});

// touch swipe
let touchX = 0;
document.getElementById('mainImgWrap').addEventListener('touchstart', e => touchX = e.touches[0].clientX, {passive:true});
document.getElementById('mainImgWrap').addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchX;
  if (Math.abs(dx) > 40) goToImg(activeImgIdx + (dx < 0 ? 1 : -1));
});

// ── COLOUR CHANGE ──
function setColour(cidx) {
  activeColourIdx = cidx;
  activeImgIdx = 0;
  buildMainGallery();
  buildThumbs();
  document.querySelectorAll('.colour-btn').forEach((btn, i) => btn.classList.toggle('active', i === cidx));
  document.getElementById('selectedColourName').textContent = product.colours[cidx].name;
  // update code display
  const newCode = getCode();
  const codeEl = document.getElementById('codeDisplay');
  if (codeEl) {
    codeEl.textContent = newCode;
    codeEl.classList.remove('code-flash');
    void codeEl.offsetWidth; // reflow to restart animation
    codeEl.classList.add('code-flash');
  }
  updateFbLink();
}

function updateFbLink() {
  const colName = product.colours[activeColourIdx].name;
  const currentCode = getCode();
  const fbMsg = encodeURIComponent(`Hi Kittos! 🐱 I'd like to order:\n\nProduct: ${product.name}\nColour: ${colName}\nCode: ${currentCode}\n\nPlease let me know the details!`);
  const btn = document.getElementById('fbOrderBtn');
  if (btn) btn.href = `https://www.facebook.com/messages/compose?body=${fbMsg}`;
}

// ── BUILD INFO PANEL ──
const fbMsg0 = encodeURIComponent(`Hi Kittos! 🐱 I'd like to order:\n\nProduct: ${product.name}\nColour: ${product.colours[0].name}\nCode: ${generateCode(product.id, 0)}\n\nPlease let me know the details!`);

document.getElementById('infoCol').innerHTML = `
  <p class="p-eyebrow">${product.cat}</p>
  <h1 class="p-title">${product.name}</h1>
  <p class="p-price">${product.price}</p>
  <p class="p-desc">${product.desc}</p>

  <div class="colour-section">
    <p class="colour-label">Colour — <span id="selectedColourName">${product.colours[0].name}</span></p>
    <div class="colour-options">
      ${product.colours.map((c, ci) => `
        <button class="colour-btn${ci===0?' active':''}" onclick="setColour(${ci})">
          <span class="colour-dot" style="background:${c.hex}"></span>
          ${c.name}
        </button>`).join('')}
    </div>
  </div>

  <div class="features-section">
    <h4>What's included</h4>
    <ul class="feature-list">
      ${product.features.map(f => `<li>${f}</li>`).join('')}
    </ul>
  </div>

  <div class="divider"></div>


`;

function copyCode() {
  navigator.clipboard.writeText(getCode()).catch(() => {});
  const toast = document.getElementById('copiedToast');
  toast.style.display = 'block';
  setTimeout(() => { toast.style.display = 'none'; }, 2000);
}

// init gallery
buildMainGallery();
buildThumbs();

// ── MORE PRODUCTS ──
const more = [
  ...products.filter(p => p.id !== product.id && p.cat === product.cat),
  ...products.filter(p => p.id !== product.id && p.cat !== product.cat)
].slice(0, 4);

document.getElementById('moreGrid').innerHTML = more.map(p => `
  <a href="product.html?id=${p.id}" class="mini-card">
    <div class="mini-img"><img src="${p.colours[0].images[0]}" alt="${p.name}" loading="lazy"></div>
    <div class="mini-info">
      <div class="mini-name">${p.name}</div>
      <div class="mini-price">${p.price}</div>
    </div>
  </a>
`).join('');
</script>
</body>
</html>
